services:
  port-narawit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    networks:
      - intern-network
    environment:
      NODE_ENV: production
      PORT: 5000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped

networks:
  intern-network:
    external: true